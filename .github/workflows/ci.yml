name: 部署

on:
  push:
    tags:
      - "v*"

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 使用 Dockerfile 打包
        run: docker buildx build --output type=local,dest=. .

      - name: 部署
        run: |
          mkdir -p /var/www/image-coloring
          rm -rf /var/www/image-coloring/*
          cp -r dist/* /var/www/image-coloring/
