name: Deploy to Server

on:
  push:
    tags:
      - "v*"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 显示运行 IP
        run: curl https://api.ipify.org

      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 使用 Dockerfile 打包
        run: docker buildx build --output type=local,dest=. .

      - name: 上传
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          source: "dist.tar.gz"
          target: "/home/ci/tmp"

      - name: 部署
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            mkdir -p /var/www/image-coloring

            rm -rf /var/www/image-coloring/*

            tar -xzf /home/ci/tmp/dist.tar.gz -C /var/www/image-coloring

            rm -f /home/ci/tmp/dist.tar.gz
